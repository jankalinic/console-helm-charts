apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "streamshub-console-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "streamshub-console-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "streamshub-console-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "streamshub-console-operator.labels" . | nindent 8 }}
      annotations:
        # Pod-level Prometheus scrape annotations (read by node-exporter/Prometheus)
        prometheus.io/scrape: "true"
        prometheus.io/path: /q/metrics
        prometheus.io/port: "8080"
        prometheus.io/scheme: http
    spec:
      serviceAccountName: {{ include "streamshub-console-operator.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Pod-level security context — defence in depth alongside container securityContext
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: streamshub-console-operator
          image: {{ include "streamshub-console-operator.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            # The operator reads its own version label to determine which image
            # tags to use when deploying Console API and UI containers
            - name: CONSOLE_DEPLOYMENT_DEFAULT_IMAGE_TAG
              valueFrom:
                fieldRef:
                  fieldPath: "metadata.labels['app.kubernetes.io/version']"
            # Cluster-wide watch scope — operator manages Console CRs in all namespaces
            - name: QUARKUS_OPERATOR_SDK_CONTROLLERS_CONSOLERECONCILER_NAMESPACES
              value: "JOSDK_ALL_NAMESPACES"
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            httpGet:
              path: /q/health/started
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          # Container-level security context
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault