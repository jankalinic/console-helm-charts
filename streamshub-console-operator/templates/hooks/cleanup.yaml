{{- if .Values.fullCleanup }}
---
# Pre-delete hook — deletes the Console CR and waits for the operator to
# finish cleaning up before Helm removes the operator itself.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-cleanup
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded,hook-failed
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "streamshub-console-operator.clusterResourceName" . }}-cleanup
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded,hook-failed
rules:
  - apiGroups: ["console.streamshub.github.com"]
    resources: ["consoles"]
    verbs: ["get", "delete", "list", "watch", "patch", "update"]
  - apiGroups: ["kafka.strimzi.io"]
    resources: ["kafkas", "kafkatopics", "kafkausers", "kafkanodepools"]
    verbs: ["get", "delete", "list", "watch", "patch", "update"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "delete", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "streamshub-console-operator.clusterResourceName" . }}-cleanup
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded,hook-failed
roleRef:
  kind: ClusterRole
  apiGroup: rbac.authorization.k8s.io
  name: {{ include "streamshub-console-operator.clusterResourceName" . }}-cleanup
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-cleanup
    namespace: {{ .Release.Namespace }}
---
# Step 1 — Strip all finalizers first so deletes are not blocked
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-remove-finalizers
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-1"
    helm.sh/hook-delete-policy: hook-succeeded,hook-failed
spec:
  template:
    spec:
      serviceAccountName: {{ .Release.Name }}-cleanup
      restartPolicy: Never
      containers:
        - name: remove-finalizers
          image: {{ .Values.hookImage }}
          command:
            - /bin/sh
            - -c
            - |
              {{- if .Values.deployConsoleInstance }}
              echo "Removing Console CR finalizers..."
              kubectl get console.console.streamshub.github.com {{ .Release.Name }} \
                -n {{ .Release.Namespace }} > /dev/null 2>&1 && \
              kubectl patch console.console.streamshub.github.com {{ .Release.Name }} \
                -n {{ .Release.Namespace }} \
                -p '{"metadata":{"finalizers":[]}}' \
                --type=merge || true
              {{- end }}

              {{- if .Values.exampleKafka.enabled }}
              NS={{ .Values.exampleKafka.namespace | default .Release.Namespace }}

              echo "Removing Kafka CR finalizers..."
              kubectl get kafka {{ include "streamshub-console-operator.kafkaName" . }} \
                -n ${NS} > /dev/null 2>&1 && \
              kubectl patch kafka {{ include "streamshub-console-operator.kafkaName" . }} \
                -n ${NS} \
                -p '{"metadata":{"finalizers":[]}}' \
                --type=merge || true

              echo "Removing KafkaTopic finalizers..."
              kubectl get kafkatopic {{ .Release.Name }}-topic \
                -n ${NS} > /dev/null 2>&1 && \
              kubectl patch kafkatopic {{ .Release.Name }}-topic \
                -n ${NS} \
                -p '{"metadata":{"finalizers":[]}}' \
                --type=merge || true

              echo "Removing KafkaUser finalizers..."
              kubectl get kafkauser {{ .Release.Name }}-kafka-user \
                -n ${NS} > /dev/null 2>&1 && \
              kubectl patch kafkauser {{ .Release.Name }}-kafka-user \
                -n ${NS} \
                -p '{"metadata":{"finalizers":[]}}' \
                --type=merge || true

              echo "Removing KafkaNodePool finalizers..."
              for np in $(kubectl get kafkanodepool \
                -l strimzi.io/cluster={{ include "streamshub-console-operator.kafkaName" . }} \
                -n ${NS} -o name 2>/dev/null); do
                kubectl patch ${np} -n ${NS} \
                  -p '{"metadata":{"finalizers":[]}}' --type=merge || true
              done
              {{- end }}

              echo "Finalizers removed."
---
# Step 2 — Delete CRs and wait for full removal
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-cleanup
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: hook-succeeded,hook-failed
spec:
  template:
    spec:
      serviceAccountName: {{ .Release.Name }}-cleanup
      restartPolicy: Never
      containers:
        - name: cleanup
          image: {{ .Values.hookImage }}
          command:
            - /bin/sh
            - -c
            - |
              {{- if .Values.deployConsoleInstance }}
              echo "Removing Console CR finalizers..."
              kubectl get console.console.streamshub.github.com {{ .Release.Name }} \
                -n {{ .Release.Namespace }} > /dev/null 2>&1 && \
              kubectl patch console.console.streamshub.github.com {{ .Release.Name }} \
                -n {{ .Release.Namespace }} \
                -p '{"metadata":{"finalizers":[]}}' \
                --type=merge || true

              echo "Deleting Console CR..."
              kubectl delete console.console.streamshub.github.com {{ .Release.Name }} \
                -n {{ .Release.Namespace }} --ignore-not-found

              echo "Waiting for Console CR to be fully removed..."
              kubectl wait console.console.streamshub.github.com {{ .Release.Name }} \
                -n {{ .Release.Namespace }} \
                --for=delete \
                --timeout=120s || true
              {{- end }}

              {{- if .Values.exampleKafka.enabled }}
              NS={{ .Values.exampleKafka.namespace | default .Release.Namespace }}

              echo "Removing KafkaTopic finalizers..."
              kubectl get kafkatopic {{ .Release.Name }}-topic \
                -n ${NS} > /dev/null 2>&1 && \
              kubectl patch kafkatopic {{ .Release.Name }}-topic \
                -n ${NS} \
                -p '{"metadata":{"finalizers":[]}}' \
                --type=merge || true

              echo "Deleting KafkaTopic..."
              kubectl delete kafkatopic {{ .Release.Name }}-topic \
                -n ${NS} --ignore-not-found

              echo "Removing KafkaUser finalizers..."
              kubectl get kafkauser {{ .Release.Name }}-kafka-user \
                -n ${NS} > /dev/null 2>&1 && \
              kubectl patch kafkauser {{ .Release.Name }}-kafka-user \
                -n ${NS} \
                -p '{"metadata":{"finalizers":[]}}' \
                --type=merge || true

              echo "Deleting KafkaUser..."
              kubectl delete kafkauser {{ .Release.Name }}-kafka-user \
                -n ${NS} --ignore-not-found

              echo "Removing Kafka CR finalizers..."
              kubectl get kafka {{ include "streamshub-console-operator.kafkaName" . }} \
                -n ${NS} > /dev/null 2>&1 && \
              kubectl patch kafka {{ include "streamshub-console-operator.kafkaName" . }} \
                -n ${NS} \
                -p '{"metadata":{"finalizers":[]}}' \
                --type=merge || true

              echo "Deleting Kafka CR..."
              kubectl delete kafka {{ include "streamshub-console-operator.kafkaName" . }} \
                -n ${NS} --ignore-not-found

              echo "Waiting for Kafka CR to be fully removed..."
              kubectl wait kafka {{ include "streamshub-console-operator.kafkaName" . }} \
                -n ${NS} \
                --for=delete \
                --timeout=180s || true

              echo "Removing KafkaNodePool finalizers..."
              for np in $(kubectl get kafkanodepool \
                -l strimzi.io/cluster={{ include "streamshub-console-operator.kafkaName" . }} \
                -n ${NS} -o name 2>/dev/null); do
                kubectl patch ${np} -n ${NS} \
                  -p '{"metadata":{"finalizers":[]}}' --type=merge || true
              done

              echo "Deleting KafkaNodePools..."
              kubectl delete kafkanodepool \
                -l strimzi.io/cluster={{ include "streamshub-console-operator.kafkaName" . }} \
                -n ${NS} --ignore-not-found
              {{- end }}

              echo "Cleanup complete."
              {{- if .Values.deleteCRDs }}
                echo "Deleting Console CRD..."
                kubectl get crd consoles.console.streamshub.github.com > /dev/null 2>&1 && \
                kubectl delete crd consoles.console.streamshub.github.com || true

                {{- if .Values.strimzi.enabled }}
                echo "Deleting Strimzi CRDs..."
                for crd in \
                  kafkas.kafka.strimzi.io \
                  kafkanodepools.kafka.strimzi.io \
                  kafkatopics.kafka.strimzi.io \
                  kafkausers.kafka.strimzi.io \
                  kafkaconnects.kafka.strimzi.io \
                  kafkamirrormaker2s.kafka.strimzi.io \
                  kafkarebalances.kafka.strimzi.io \
                  kafkabridges.kafka.strimzi.io \
                  kafkaconnectors.kafka.strimzi.io \
                  kafkamirrormakers.kafka.strimzi.io; do
                  kubectl get crd ${crd} > /dev/null 2>&1 && \
                  kubectl delete crd ${crd} || true
                done
                {{- end }}
              {{- end }}
{{- end }}