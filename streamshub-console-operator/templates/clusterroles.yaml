{{- if .Values.rbac.create }}
---
# Main reconciler role: full CRUD on Console CRD + core K8s resources the operator manages
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "streamshub-console-operator.fullname" . }}-reconciler
  labels:
    {{- include "streamshub-console-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["console.streamshub.github.com"]
    resources: ["consoles", "consoles/status", "consoles/finalizers"]
    verbs: ["get", "list", "watch", "patch", "update", "create", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterrolebindings", "clusterroles"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: [""]
    resources: ["serviceaccounts", "services", "configmaps", "secrets"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
---
# CRD validation role: read-only access to CRDs so the operator can validate
# that required Strimzi CRDs are present in the cluster
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "streamshub-console-operator.fullname" . }}-crd-validating
  labels:
    {{- include "streamshub-console-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
---
# Additional role: leader election leases, Strimzi resource access,
# OpenShift and Prometheus integrations
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "streamshub-console-operator.fullname" . }}-additional
  labels:
    {{- include "streamshub-console-operator.labels" . | nindent 4 }}
rules:
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
  - apiGroups: ["coordination.k8s.io"]
    resourceNames: ["streamshub-console-operator-lease"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "delete", "patch", "update", "create"]
  # Core resource discovery
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get"]
  # Ingress discovery (legacy extensions API)
  - apiGroups: ["extensions"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  # Metrics scraping
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
  # Strimzi resource access — read most, patch Kafka and KafkaRebalance
  - apiGroups: ["kafka.strimzi.io"]
    resources:
      - kafkas
      - kafkanodepools
      - kafkarebalances
      - kafkatopics
      - kafkausers
      - kafkaconnects
      - kafkamirrormaker2s
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kafka.strimzi.io"]
    resources: ["kafkas", "kafkarebalances"]
    verbs: ["patch"]
  # Prometheus Operator integration
  - apiGroups: ["monitoring.coreos.com"]
    resourceNames: ["k8s"]
    resources: ["prometheuses/api"]
    verbs: ["get", "create", "update"]
  # OpenShift cluster version detection
  - apiGroups: ["config.openshift.io"]
    resourceNames: ["version"]
    resources: ["clusterversions"]
    verbs: ["get"]
  # OpenShift Thanos/metrics route
  - apiGroups: ["route.openshift.io"]
    resourceNames: ["thanos-querier"]
    resources: ["routes"]
    verbs: ["get"]
{{- end }}