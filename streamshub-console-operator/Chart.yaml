apiVersion: v2
name: streamshub-console-operator
description: User interface to monitor Apache Kafka® clusters managed by Strimzi
type: application

# Chart version — kept in sync with appVersion so that --version 0.11.0
# always means operator 0.11.0. Patch bumps (e.g. 0.11.1) are used for
# chart-only fixes that don't change the operator version.
version: 0.11.0

# appVersion — the operator image tag deployed by this chart version.
appVersion: "0.11.0"

dependencies:
  - name: strimzi-kafka-operator
    version: ">=0.50.0"
    repository: "https://strimzi.io/charts/"
    condition: strimzi.enabled

keywords:
  - kafka
  - strimzi
  - messaging
  - streaming
  - console
  - operator
  - monitoring

home: https://github.com/streamshub/console
sources:
  - https://github.com/streamshub/console

icon: https://raw.githubusercontent.com/jankalinic/console-helm-charts/refs/heads/main/resources/community-logo-white.png

maintainers:
  - name: jankalinic
    email: work.kalinic@gmail.com

annotations:
  # ArtifactHub — operator classification
  artifacthub.io/operator: "true"
  artifacthub.io/operatorCapabilities: Basic Install
  # License
  artifacthub.io/license: Apache-2.0
  # Links shown on the ArtifactHub page
  artifacthub.io/links: |
    - name: Documentation
      url: https://github.com/streamshub/console/blob/main/README.md
    - name: Source
      url: https://github.com/streamshub/console