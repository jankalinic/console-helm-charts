# -- Number of operator replicas (should stay 1)
replicaCount: 1

image:
  # -- Operator container image repository
  repository: quay.io/streamshub/console-operator
  # -- Image tag. Defaults to the chart appVersion if not set
  tag: ""
  # -- Image pull policy
  pullPolicy: Always

# -- Namespaces the operator should watch. Left empty for all namespaces since operator is cluster-wide
watchNamespaces: ""

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 500m
    memory: 512Mi

# -- ServiceAccount configuration
serviceAccount:
  # -- Name of the ServiceAccount to create/use
  name: streamshub-console-operator

# -- ServiceMonitor for Prometheus scraping (requires prometheus-operator CRD)
serviceMonitor:
  enabled: true

# -- Extra environment variables to inject into the operator container
extraEnv: []
# - name: MY_VAR
#   value: "my-value"

# -- Image pull secrets if pulling from a private registry
imagePullSecrets: []
# - name: my-registry-secret
