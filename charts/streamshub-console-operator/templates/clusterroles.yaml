---
# Main reconciler role: full CRUD on consoles CRD + core K8s resources the operator manages
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: streamshub-consolereconciler-cluster-role
  labels:
    {{- include "streamshub-console-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [console.streamshub.github.com]
    resources: [consoles, consoles/status, consoles/finalizers]
    verbs: [get, list, watch, patch, update, create, delete]
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [clusterrolebindings]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [""]
    resources: [serviceaccounts]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [""]
    resources: [services]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [clusterroles]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [create, delete, get, list, patch, update, watch]
---
# CRD validation role: read-only access to CRDs
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: streamshub-console-crd-validating-cluster-role
  labels:
    {{- include "streamshub-console-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [get, list]
---
# Additional role: leases, Strimzi, OpenShift/Prometheus integrations
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: streamshub-consolereconciler-additional-cluster-role
  labels:
    {{- include "streamshub-console-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [create]
  - apiGroups: [coordination.k8s.io]
    resourceNames: [streamshub-console-operator-lease]
    resources: [leases]
    verbs: [get, list, watch, delete, patch, update, create]
  - apiGroups: [route.openshift.io]
    resourceNames: [thanos-querier]
    resources: [routes]
    verbs: [get]
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, services, endpoints, pods]
    verbs: [get, list, watch]
  - apiGroups: [extensions]
    resources: [ingresses]
    verbs: [get, list, watch]
  - nonResourceURLs: [/metrics]
    verbs: [get]
  - apiGroups: [kafka.strimzi.io]
    resources: [kafkas, kafkanodepools, kafkarebalances, kafkatopics, kafkausers, kafkaconnects, kafkamirrormaker2s]
    verbs: [get, watch, list]
  - apiGroups: [kafka.strimzi.io]
    resources: [kafkas, kafkarebalances]
    verbs: [patch]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list]
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get]
  - apiGroups: [monitoring.coreos.com]
    resourceNames: [k8s]
    resources: [prometheuses/api]
    verbs: [get, create, update]
  - apiGroups: [config.openshift.io]
    resourceNames: [version]
    resources: [clusterversions]
    verbs: [get]
