apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamshub-console-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "streamshub-console-operator.labels" . | nindent 4 }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /q/metrics
    prometheus.io/port: "8080"
    prometheus.io/scheme: http
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "streamshub-console-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "streamshub-console-operator.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /q/metrics
        prometheus.io/port: "8080"
        prometheus.io/scheme: http
    spec:
      serviceAccountName: {{ include "streamshub-console-operator.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: streamshub-console-operator
          image: {{ include "streamshub-console-operator.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            # The operator reads its own version label to know which image tags to deploy for Console instances
            - name: CONSOLE_DEPLOYMENT_DEFAULT_IMAGE_TAG
              valueFrom:
                fieldRef:
                  fieldPath: "metadata.labels['app.kubernetes.io/version']"
            # Controls which namespaces the operator watches. JOSDK_ALL_NAMESPACES = cluster-wide
            - name: QUARKUS_OPERATOR_SDK_CONTROLLERS_CONSOLERECONCILER_NAMESPACES
              value: {{ .Values.watchNamespaces | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            httpGet:
              path: /q/health/started
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
